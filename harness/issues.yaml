  - id: 23
    title: "Design participant global instructions (copilot-instructions.md)"
    state: open
    labels: [phase-1c, polish, needs-discussion]
    body: |
      Create the user-level instructions that participants will use. This is
      the foundation that makes skills, tape, and the harness work.

      **Requires interactive session** to calibrate tone/approach.

      ## Key Design Questions

      **Hierarchy understanding:**
      - How do global vs project instructions work in GHCP?
      - What goes where? What's the mental model for beginners?
      - How do we explain this without overwhelming them?

      **Tone/sentiment calibration:**
      - What "temperature" for new users? (cautious? eager? neutral?)
      - How skeptical should Claude be? (verify everything? trust user?)
      - How verbose? (explain reasoning? just do it?)
      - How proactive? (suggest improvements? wait to be asked?)

      **System awareness:**
      - Skills: how to discover, use, extend
      - Tape system: /ws, /wd, /housekeeping - what participants need to know
      - Session continuity: mental model for "AI has no memory"
      - Project instructions: when/how to create them

      **Content to include:**
      - Who this user is (PCT cabinet member, new to CLI AI)
      - What skills are available (/pct-deck, /pct-memo, etc.)
      - How to start/end sessions effectively
      - Best practices distilled for beginners
      - Links to cheatsheets and docs

      ## Deliverables

      - copilot-instructions.md (bundled in harness)
      - Section in workshop explaining the hierarchy
      - "Your first project CLAUDE.md" template/guide

      ## Notes from planning

      - These users are new - err on side of helpful over terse
      - Instructions should teach while instructing
      - Balance: enough context to be effective, not so much it's overwhelming
      - Consider: graduated complexity? start simple, add as they learn?

      Depends on: understanding GHCP instruction hierarchy

      ## Important: GHCP not Claude Code

      Participants will use **GHCP** (GitHub Copilot CLI), not Claude Code.
      Deliverables must use GHCP constructs:
      - `copilot-instructions.md` (not CLAUDE.md)
      - `.claude/commands/` for skills (already done)
      - GHCP's config and hierarchy conventions

      Matt's project management stays in Claude Code (CLAUDE.md, /ws /wd, tape).

  - id: 24
    title: "Review installer for GHCP compatibility"
    state: open
    labels: [phase-1c, validation, needs-review]
    body: |
      Before shipping, verify install-harness.sh sets up GHCP correctly.

      ## What installer should do for participants

      - Wire up `copilot-instructions.md` to GHCP's user-level location
      - Link `.claude/commands/` for skills
      - Install Python deps for document generation
      - NOT set up Claude Code specific things (tape, MCP, etc.)

      ## Review checklist

      - [ ] Verify GHCP's expected paths for user instructions
      - [ ] Verify GHCP's expected paths for commands/skills
      - [ ] Remove or skip Claude Code-specific setup (MCP, tape)
      - [ ] Test on clean machine with only GHCP installed
      - [ ] Verify skills work after install (`/pct-deck`, etc.)
      - [ ] Verify templates are accessible
      - [ ] Error handling for missing deps (Python, etc.)

      ## Possible changes needed

      - May need separate install modes: `--ghcp` vs `--claude-code`
      - Or: detect which CLI is available and configure accordingly
      - Or: two separate scripts (install-ghcp.sh, install-claude.sh)

      ## Test scenarios

      1. Fresh GHCP user, no prior AI CLI setup
      2. User with existing copilot config (don't clobber)
      3. Missing Python (graceful degradation)

      Depends on: #23 (instructions design), understanding GHCP paths
