  - id: 1
    title: "Initialize Astro project with Tailwind"
    state: open
    labels: [phase-1a, infrastructure, next]
    body: |
      Set up the Astro project foundation:
      - Create site/ directory with Astro + Tailwind
      - Configure astro.config.mjs (base path, Shiki, integrations)
      - Set up tailwind.config.mjs with design tokens
      - Create package.json with scripts

      Spec: docs/superpowers/specs/2025-04-15-presentation-site-design.md

  - id: 2
