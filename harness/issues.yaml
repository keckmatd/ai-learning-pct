    state: open
    labels: [phase-1a, infrastructure]
    body: |
      Build the three core layouts:
      - BaseLayout.astro: HTML shell, fonts, global styles
      - SlideLayout.astro: Full-screen presentation mode
      - DocsLayout.astro: Navigable documentation mode

      Depends on: #1

