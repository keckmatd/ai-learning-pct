  #       description: What it does
  #       features: []
  #       justfile: false
  #       repo: null

# Stack definitions (global, not per-machine)
stacks:
  flutter:
    template: justfile.flutter
    tools:
      - flutter
      - dart
    build_dir: build

  dotnet:
    template: justfile.dotnet
    tools:
      - dotnet
    build_dir: bin

  go:
    template: justfile.go
    tools:
      - go
    build_dir: bin

  java:
    template: justfile.java
    tools:
      - java
      - gradle
    build_dir: build

  angular:
    template: justfile.angular
    tools:
      - node
      - npm
    build_dir: dist

  python:
    template: justfile.python
    tools:
      - python3
      - pip
    build_dir: dist

  typescript:
    template: justfile.typescript
    tools:
      - node
      - pnpm
    build_dir: dist

  expo:
    template: justfile.expo
    tools:
      - node
      - npx
      - eas
    build_dir: dist

  shell:
    template: null
    tools:
      - bash
    build_dir: null
